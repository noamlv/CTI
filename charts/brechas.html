<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --text: #111111;
        --muted: #6F6F6F;
        --track: #F3F4F6;
      }
      body {
        margin: 0;
        background: #FFFFFF;
        color: var(--text);
        font-family: "Söhne", "Soehne", Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }
      .chart {
        padding: 18px;
      }
      .title {
        margin: 0 0 14px;
        font-size: 13px;
        color: var(--muted);
        font-weight: 600;
      }
      .row {
        display: grid;
        grid-template-columns: 182px 1fr 34px;
        gap: 10px;
        align-items: center;
        margin: 9px 0;
      }
      .label {
        font-size: 13px;
        font-weight: 600;
      }
      .track {
        background: var(--track);
        height: 13px;
        border-radius: 999px;
        overflow: hidden;
      }
      .bar {
        height: 100%;
        border-radius: 999px;
      }
      .v {
        text-align: right;
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="chart">
      <p class="title">Frecuencia de déficits institucionales en causas directas</p>
      <div class="row">
        <div class="label">Capacidad operativa</div>
        <div class="track"><div class="bar" style="width:100%; background:#2563EB;"></div></div>
        <div class="v">4</div>
      </div>
      <div class="row">
        <div class="label">Tecnología</div>
        <div class="track"><div class="bar" style="width:75%; background:#0EA5E9;"></div></div>
        <div class="v">3</div>
      </div>
      <div class="row">
        <div class="label">Información</div>
        <div class="track"><div class="bar" style="width:50%; background:#4F46E5;"></div></div>
        <div class="v">2</div>
      </div>
      <div class="row">
        <div class="label">Coordinación</div>
        <div class="track"><div class="bar" style="width:50%; background:#10B981;"></div></div>
        <div class="v">2</div>
      </div>
      <div class="row">
        <div class="label">Incentivos</div>
        <div class="track"><div class="bar" style="width:25%; background:#22C55E;"></div></div>
        <div class="v">1</div>
      </div>
    </div>
  </body>
</html>
